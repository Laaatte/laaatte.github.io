# jekyll build and deploy workflow, generated with gpt
# builds site on push/pr, deploys only on main push
name: jekyll build and deploy

permissions:
  contents: write  # required to push generated files to repo
  pages: write     # required for github pages deployment
  id-token: write  # required by github pages deploy action

on:
  # deploy trigger
  push:
    branches: [ main ]

  # build-only trigger for pull requests
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest  # github-hosted runner

    steps:
      # fetch repository contents
      - name: checkout repository
        uses: actions/checkout@v4

      # setup ruby environment for jekyll
      - name: set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true  # cache gems to speed up builds

      # install sass cli for scss compilation
      - name: install sass
        run: npm install -g sass

      # build jekyll site with production settings
      - name: build jekyll site
        run: JEKYLL_ENV=production bundle exec jekyll build --trace

      # deploy only when pushing to main branch
      - name: deploy to github pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site         # jekyll build output
          publish_branch: github-pages # pages source branch