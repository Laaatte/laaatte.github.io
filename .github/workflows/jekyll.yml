# jekyll build custom, generated with gpt
name: jekyll build and deploy

permissions:
  contents: write  # allows workflow to write to repo
  pages: write     # allows publishing to github pages
  id-token: write  # required for deployment

on:
  push:
    branches: [ main ]  # run on push to main
  pull_request:
    branches: [ main ]  # run on pull request to main

jobs:
  build:
    runs-on: ubuntu-latest  # latest ubuntu environment

    steps:
      # checkout repository
      - name: checkout repository
        uses: actions/checkout@v4

      # setup ruby environment
      - name: set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true  # cache gems for faster builds

      # install sass
      - name: install sass
        run: npm install -g sass

      # build jekyll site
      - name: build jekyll site
        run: JEKYLL_ENV=production bundle exec jekyll build --trace

      # deploy to github pages
      - name: deploy to github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: github-pages