# jekyll build custom, generated with gpt
name: jekyll build and deploy

permissions:
  contents: write  # allows the workflow to write to the repository contents
  pages: write     # allows the workflow to push to GitHub Pages
  id-token: write  # allows the workflow to authenticate and deploy

on:
  push:
    branches: [ main ]  # runs on push to the main branch
  pull_request:
    branches: [ main ]  # runs on pull request targeting main branch

jobs:
  build:
    runs-on: ubuntu-latest  # runs on the latest Ubuntu environment

    steps:
      # checkout repository (fetch-depth 0 is required so _plugins is included)
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensures full repo including hidden folders

      # setup ruby (latest stable)
      - name: set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'  # specify Ruby version
          bundler-cache: false  # disable bundler cache to ensure plugin updates work

      # install sass
      - name: install sass
        run: npm install -g sass  # install sass using npm globally

      # install ruby dependencies
      - name: install gems
        run: bundle install  # ensures Gemfile updates are applied

      # build jekyll site
      - name: build jekyll site
        run: bundle exec jekyll build --trace  # builds the Jekyll site with trace logs

      # deploy using GitHub Token (recommended)
      - name: deploy to github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # uses GitHub token for deployment
          publish_dir: ./_site  # the directory to publish to GitHub Pages
          publish_branch: github-pages  # the branch where the site will be deployed