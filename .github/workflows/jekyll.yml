# jekyll build custom, generated with gpt
name: jekyll build and deploy

permissions:
  contents: write  # allows the workflow to write to the repository contents
  pages: write     # allows the workflow to push to GitHub Pages
  id-token: write  # allows the workflow to authenticate and deploy

on:
  push:
    branches: [ main ]  # runs on push to the main branch
  pull_request:
    branches: [ main ]  # runs on pull request targeting main branch

jobs:
  build:
    runs-on: ubuntu-latest  # runs on the latest Ubuntu environment

    steps:
      # checkout repository fully (important for _plugins)
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensure full repo is checked out

      # setup ruby
      - name: set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false  # disable cache so plugins always load

      # install sass
      - name: install sass
        run: npm install -g sass

      # install gems
      - name: install gems
        run: bundle install

      # build jekyll
      - name: build jekyll site
        run: bundle exec jekyll build --trace

      # deploy to GitHub Pages
      - name: deploy to github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: github-pages