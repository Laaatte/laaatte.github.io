# jekyll build custom, generated with gpt
name: jekyll build and deploy

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # checkout
      - name: checkout repository
        uses: actions/checkout@v4

      # setup ruby (latest stable)
      - name: set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # install sass
      - name: install sass
        run: npm install -g sass

      # build jekyll
      - name: build jekyll site
        run: bundle exec jekyll build --trace

      # deploy using GitHub Token (recommended)
      - name: deploy to github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: github-pages