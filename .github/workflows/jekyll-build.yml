# jekyll build custom, generated with gpt
name: jekyll build and deploy

permissions:
  contents: read
  pull-requests: write
  
# trigger workflow on push to main and pull requests targeting main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # use latest ubuntu runner
    
    steps:
      # checkout repository
      - name: checkout repository
        uses: actions/checkout@v3
        
      # set up ruby
      - name: set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'  # using ruby 3.1
          
      # install ruby dependencies
      - name: install dependencies
        run: |
          gem install bundler      # install bundler
          bundle install           # install gems

      # install latest dart sass
      - name: install sass (latest)
        run: |
          npm install -g sass      # install dart sass globally

      # build jekyll site
      - name: build the jekyll site
        run: |
          bundle exec jekyll build

      # deploy to github pages
      - name: deploy to github pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # auth token
          publish_dir: ./_site      # output directory
          publish_branch: github-pages