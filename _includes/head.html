<head>
  <meta charset="utf-8">

  <!-- basic meta tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}">

  <!-- seo meta description -->
  {% assign meta_desc = page.description | default: page.excerpt | default: site.description %}
  <meta name="description" content="{{ meta_desc | strip_html | truncate: 150 }}">

  <!-- privacy and security meta -->
  <meta name="referrer" content="no-referrer">

  <!-- content security policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com 'unsafe-inline';
    connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https://www.google-analytics.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">

  <!-- page title -->
  <title>
    {% if page.title != null %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- open graph metadata -->
  <meta property="og:url" content="{{ site.url }}{{ page.url | replace:'index.html','' }}">
  <meta property="og:type" content="{% if page.page_type == 'post' %}article{% else %}{{ site.og_type }}{% endif %}">
  <meta property="og:image" content="{{ site.url }}{{ page.og_image | default: site.og_image }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:description" content="{{ meta_desc | strip_html | truncate: 200 }}">
  <meta property="og:locale" content="{{ site.og_locale }}">

  <!-- twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 200 | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ page.og_image | default: site.og_image }}">

  <!-- favicon -->
  <!-- light mode -->
  <link rel="icon" href="/assets/favicon/light/favicon-light.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/light/favicon-32-light.png" media="(prefers-color-scheme: light)">

  <!-- dark mode -->
  <link rel="icon" href="/assets/favicon/dark/favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/dark/favicon-32-dark.png" media="(prefers-color-scheme: dark)">

  <!-- stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- color mode btn script -->
  <script>
    (function () {
      try {
        const theme = localStorage.getItem("theme");
        if (theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) { }
    })();
  </script>

  <!-- google analytics include -->
  {% include google-analytics.html %}
</head>
