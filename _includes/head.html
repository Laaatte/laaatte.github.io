<head>
  <!-- meta basics -->
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- seo meta description -->
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 150 | default: site.description }}">

  <!-- privacy and security meta -->
  <meta name="referrer" content="no-referrer">

  <!-- basic csp for static site security -->
   <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self'
      https://www.googletagmanager.com
      https://www.google-analytics.com
    'unsafe-inline';
    connect-src 'self'
      https://www.google-analytics.com
      https://www.googletagmanager.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https://www.google-analytics.com;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
  ">

  <!-- page title -->
  <title>
    {% if page.title != null %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- open graph -->
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:type" content="{{ site.og_type }}">
  <meta property="og:image" content="{{ site.og_image }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:locale" content="{{ site.og_locale }}">

  <!-- twitter card -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- scripts (defer improves load performance) -->
  <script src="{{ '/assets/js/nav-toggle.js' | relative_url }}" defer></script>

  <!-- google analytics -->
  {% include google-analytics.html %}
</head>
