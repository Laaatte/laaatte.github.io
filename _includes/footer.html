<footer class="footer">

  <div class="footer__line"></div>

  <div class="footer__item layout-container">

    {% assign author = site.data.author-data %}

    <ul>

      <li>
        <a class="footer__link" href="{{ author.github_link }}" target="_blank" rel="noopener noreferrer">
          {{ author.github_username }}
        </a>
      </li>
      <li>
        Build by
        <a class="footer__link" href="https://jekyllrb.com" target="_blank" rel="noopener noreferrer">
          Jekyll
        </a>
      </li>
      <li>
        Powered by
        <a class="footer__link" href="https://pages.github.com" target="_blank" rel="noopener noreferrer">
          GitHub Pages
        </a>
      </li>

    </ul>

  </div>

</footer>
