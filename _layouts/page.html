---
layout: default
---
<article class="article">

  {% if page.title != null and page.show_article_header %}
  <div class="article__item">
    <!-- back button for pages with article header -->
    <a class="article__back-link" href="{{ page.back_url | default: '/' | relative_url }}" onclick="if (history.length > 1) { history.back(); return false; }">←</a>
    <!-- post title heading -->
    <h1 class="article__title">{{ page.title }}</h1>
  </div>
  {% endif %}

  <!-- main article content -->
  <section class="article__content">
    {{ content }}
  </section>

  {% if page.show_to_top %}
  <button class="to-top" type="button" aria-label="맨 위로 이동">↑</button>
  <script src="{{ '/assets/js/to-top.js' | relative_url }}" defer></script>
  {% endif %}

</article>
