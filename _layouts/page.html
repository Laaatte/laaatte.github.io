---
layout: default
---
<article class="article">
  
  {% if page.title != null and page.page_type contains "post" %}
  <a class="page-back" href="javascript:history.back()">← Back</a>
  <p class="page-header">{{ page.title }}</p>
  {% endif %}

  <section class="page-content">
    {{ content }}
  </section>

</article>
