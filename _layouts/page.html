---
layout: default
---
<article class="article">

  {% if page.title != null and page.page_type contains "post" %}
  <a class="article__back-link" href="javascript:history.back()">← Back</a>
  <p class="article__header">{{ page.title }}</p>
  {% endif %}

  <section class="article__content layout-container">
    {{ content }}
  </section>

</article>
