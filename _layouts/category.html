---
layout: page
---
{% assign cat_key = page.cat_key %}
{% assign cat_posts = site.categories[cat_key] | default: empty %}

<div class="cat">
  {% if cat_posts.size > 0 %}
    {% include cat-lt.html posts=cat_posts %}
    {% include cat-arc.html posts=cat_posts %}
  {% else %}
    <p class="cat__empty">No posts found.</p>
  {% endif %}
</div>
