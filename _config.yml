# ----------------------------
# jekyll configuration
# ----------------------------

# site information
url: https://nothumanity.github.io
title: nothumanity
description: jekyll blog
lang: ko
timezone: asia/seoul

# open graph meta
og_type: website
og_locale: ko_kr
# og_image:

# google analytics
google_analytics: g-8y1w84b2cx

# sass configuration
sass:
  sass_dir: _sass
  style: compressed
  load_paths:
    - _sass/layout
    - _sass/syntax

# markdown rendering
markdown: kramdown
kramdown:
  input: kramdown
  syntax_highlighter: rouge

# permalink structure for posts
permalink: /:title

# force include extra output files
include:
  - posts.json

# custom collections (tabs, categories)
collections:
  tabs:
    output: true
    sort_by: order
  category:
    output: true

# default front matter values
defaults:
  - scope:
      type: posts
    values:
      layout: page
      permalink: /:collection/:title
      page_type: post

  - scope:
      type: tabs
    values:
      layout: page
      permalink: /:collection/:name

  - scope:
      type: category
    values:
      layout: category
      permalink: /:collection/:name