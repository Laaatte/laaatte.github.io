# ----------------------------
# jekyll configuration
# ----------------------------

# site info
url: https://nothumanity.github.io
title: NotHumanity
description: jekyll blog
lang: ko
timezone: asia/seoul

# open graph
og_type: website
og_locale: ko_kr
# og_image:

# google analytics
google_analytics: g-8y1w84b2cx

# sass settings
sass:
  sass_dir: _sass
  style: compressed
  load_paths:
    - _sass/layout
    - _sass/syntax

# markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# url structure
permalink: /:title

# include extra output files
include:
  - posts.json  # include posts.json file for json output

# collections (tabs, categories)
collections:
  tabs:
    output: true
    sort_by: order
  category:
    output: true

# default front matter
defaults:
  - scope:
      type: posts
    values:
      layout: page
      permalink: /:collection/:title
      page_type: post

  - scope:
      type: tabs
    values:
      layout: page
      permalink: /:collection/:name

  - scope:
      type: category
    values:
      layout: category
      permalink: /:collection/:name