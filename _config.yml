# ----------------------------
# jekyll configuration
# ----------------------------
# site info
url: https://laaatte.github.io
title: Laaatte
description: jekyll blog
lang: ko
timezone: asia/seoul

# open graph
og_type: website
og_locale: ko_kr
og_image: /assets/og-image.png

# google analytics
google_analytics: G-8Y1W84B2CX

# sass settings
sass:
  sass_dir: _sass
  style: compressed
  load_paths:
    - _sass/layout
    - _sass/syntax

# markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# url structure
permalink: /:title

# collections (info, categories)
collections:
  info:
    output: true
    sort_by: order
  category:
    output: true

# default front matter
defaults:
  - scope:
      type: posts
    values:
      layout: page
      permalink: /:collection/:title
      page_type: post

  - scope:
      type: info
    values:
      layout: page
      permalink: /:name

  - scope:
      type: category
    values:
      layout: category
      permalink: /:collection/:name