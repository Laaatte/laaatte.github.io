# ----------------------------
# jekyll configuration
# ----------------------------
# site info
url: https://nothumanity.github.io
title: NotHumanity
description: Jekyll blog
lang: ko
timezone: Asia/Seoul

# open Graph
og_type: website
og_locale: ko_kr
# og_image: 

# google analytics
google_analytics: G-8Y1W84B2CX

# plugins
plugins:
  - jekyll-paginate

# sass settings
sass:
  sass_dir: _sass
  style: compressed
  load_paths:
    - _sass/layout
    - _sass/syntax

# markdown & syntax highlighting
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# url structure
permalink: /:title

# pagination
paginate: 10
paginate_path: /:num

# collections (tabs, categories)
collections:
  tabs:
    output: true
    sort_by: order
  category:
    output: true

# default front matter
defaults:
  -
    scope:
      type: posts
    values:
      layout: page
      permalink: /:collection/:title
      page_type: post

  -
    scope:
      type: tabs
    values:
      layout: page
      permalink: /:collection/:name

  -
    scope:
      type: category
    values:
      layout: category
      permalink: /:collection/:name